# App secret dictionaries store sensitive information for apps in the
# organization. This template keeps the cpflow app-secret placeholders
# {{APP_SECRETS}} and {{APP_SECRETS_POLICY}}.
#
# cpflow 5.2.0 shared_secret_grants are only for a separate shared
# org-level dictionary referenced from app/workload templates with
# {{SHARED_SECRET_<NAME>}}.

# The qa-* dictionary is bootstrapped via this template for review apps.
# Review apps run pull request code, so values in this dictionary must be
# disposable or otherwise acceptable for review-app exposure. Prod and staging
# dictionaries are created manually with separate real values.

# Initial bootstrap (once, manually, not in CI):
#   cpflow apply-template secrets -a qa-react-webpack-rails-tutorial --org shakacode-open-source-examples-staging
#
# Populate real values with `cpln apply -f <file>` or `cpln secret edit`.
# Do NOT re-apply this template after real values are set: it will
# overwrite them with the placeholders below.

kind: secret
name: {{APP_SECRETS}}
type: dictionary
data:
  # Both sides of the Rails/Node renderer handshake must match.
  # Generate with `openssl rand -hex 32`.
  RENDERER_PASSWORD: "replace-with-openssl-rand-hex-32"
  # Shared bearer token for React on Rails Pro rolling-deploy bundle pulls.
  # Generate with `openssl rand -hex 32`.
  ROLLING_DEPLOY_TOKEN: "replace-with-openssl-rand-hex-32"
  # JWT from https://pro.reactonrails.com/. Use a review-safe token for public
  # review apps if the production token must not be exposed to pull request code.
  REACT_ON_RAILS_PRO_LICENSE: "replace-with-pro-license-jwt"

---

# App secret policy grants app identities reveal access to this dictionary.
kind: policy
name: {{APP_SECRETS_POLICY}}
targetKind: secret
targetLinks:
  - //secret/{{APP_SECRETS}}
