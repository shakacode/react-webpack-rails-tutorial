# Template setup of Rails server workload, roughly corresponding to Heroku dyno
# type within Procfile.
kind: workload
name: rails
spec:
  type: standard
  containers:
    - name: rails
      # 300m is a good starting place for a test app. You can experiment with CPU configuration
      # once your app is running.
      cpu: 300m
      env:
        - name: LOG_LEVEL
          value: debug
      # Inherit other ENV values from GVC
      inheritEnv: true
      image: {{APP_IMAGE_LINK}}
      # 1Gi (up from 512Mi) gives the single container enough headroom for
      # Rails + the Pro Node renderer. Below the marketplace demo's 2Gi
      # because this tutorial's Rails surface is smaller; capacityAI below
      # adjusts upward if actual usage warrants it.
      memory: 1Gi
      ports:
        - number: 3000
          protocol: http
          # Note: Keep as 'http' - Thruster handles HTTP/2 on the TLS frontend,
          # but the load balancer communicates with the container via HTTP/1.1
  defaultOptions:
    # Start out like this for "test apps"
    autoscaling:
      # Max of 1 effectively disables autoscaling, so a like a Heroku dyno count of 1
      maxScale: 1
    # CapacityAI adjusts CPU/memory within the single replica based on observed
    # usage, so the 1Gi/300m baseline can grow if Rails + renderer need more.
    capacityAI: true
  firewallConfig:
    external:
      # Default to allow public access to Rails server
      inboundAllowCIDR:
        - 0.0.0.0/0
      # Could configure outbound for more security
      outboundAllowCIDR:
        - 0.0.0.0/0
  # Identity is used for binding workload to secrets
  identityLink: {{APP_IDENTITY_LINK}}
