name: Promote Staging to Production

on:
  workflow_dispatch:
    inputs:
      confirm_promotion:
        description: Type "promote" to confirm promotion of staging to production
        required: true
        type: string

permissions:
  contents: write

jobs:
  promote-to-production:
    if: github.event.inputs.confirm_promotion == 'promote'
    uses: shakacode/control-plane-flow/.github/workflows/cpflow-promote-staging-to-production.yml@jg-codex/reusable-github-actions
    with:
      control_plane_flow_ref: jg-codex/reusable-github-actions
    secrets: inherit
