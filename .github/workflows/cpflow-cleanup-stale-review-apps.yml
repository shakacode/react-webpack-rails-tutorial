name: Cleanup Stale Review Apps

on:
  workflow_dispatch:
  schedule:
    - cron: "0 0 * * *"

permissions:
  contents: read

jobs:
  cleanup:
    # Cleanup targets qa-react-webpack-rails-tutorial-<PR>. Manually delete any
    # legacy qa-react-webpack-rails-tutorial-pr-<PR> apps during migration.
    uses: shakacode/control-plane-flow/.github/workflows/cpflow-cleanup-stale-review-apps.yml@a83a38fa3e60538cd54d193791302d0dc52df695
    with:
      control_plane_flow_ref: a83a38fa3e60538cd54d193791302d0dc52df695
    secrets:
      CPLN_TOKEN_STAGING: ${{ secrets.CPLN_TOKEN_STAGING }}
