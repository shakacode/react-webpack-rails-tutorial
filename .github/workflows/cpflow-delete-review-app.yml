name: Delete Review App

on:
  pull_request_target:
    types: [closed]
  issue_comment:
    types: [created]
  workflow_dispatch:
    inputs:
      pr_number:
        description: Pull request number targeted for deletion
        required: true
        type: number

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  delete-review-app:
    if: |
      (github.event_name == 'issue_comment' &&
       github.event.issue.pull_request &&
       contains(fromJson('["+review-app-delete","+review-app-delete\n","+review-app-delete\r\n"]'), github.event.comment.body) &&
       contains(fromJson('["OWNER","MEMBER","COLLABORATOR"]'), github.event.comment.author_association)) ||
      (github.event_name == 'pull_request_target' && github.event.action == 'closed') ||
      github.event_name == 'workflow_dispatch'
    uses: shakacode/control-plane-flow/.github/workflows/cpflow-delete-review-app.yml@19501451b7e08a48a917fb04a439171881558f82
    with:
      control_plane_flow_ref: 19501451b7e08a48a917fb04a439171881558f82
    secrets:
      CPLN_TOKEN_STAGING: ${{ secrets.CPLN_TOKEN_STAGING }}
