name: Show Review App Commands on PR Open

on:
  # pull_request_target is intentional: it has write permission to comment on PRs from
  # forks, where `pull_request` would be read-only. This is safe because no PR code is
  # checked out — the job only calls the upstream reusable workflow with a hardcoded
  # message.
  pull_request_target:
    types: [opened]

permissions:
  issues: write
  pull-requests: write

jobs:
  show-help:
    uses: shakacode/control-plane-flow/.github/workflows/cpflow-review-app-help.yml@7d9b80dcb55b243d0cc78b0a85bcb3d568ce8e02
    with:
      control_plane_flow_ref: 7d9b80dcb55b243d0cc78b0a85bcb3d568ce8e02
