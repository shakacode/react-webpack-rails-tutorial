name: Show Review App Commands on PR Open

on:
  # pull_request_target is intentional: it has write permission to comment on PRs from
  # forks, where `pull_request` would be read-only. This is safe because no PR code is
  # checked out — the job only calls the upstream reusable workflow with a hardcoded
  # message.
  pull_request_target:
    types: [opened]

permissions:
  issues: write
  pull-requests: write

jobs:
  show-help:
    uses: shakacode/control-plane-flow/.github/workflows/cpflow-review-app-help.yml@b0c5759050c5c79a05826cd7a5d3ae711cd22a40
    with:
      control_plane_flow_ref: b0c5759050c5c79a05826cd7a5d3ae711cd22a40
