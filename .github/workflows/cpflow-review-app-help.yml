name: Show Review App Commands on PR Open

on:
  # pull_request_target is intentional: it has write permission to comment on PRs from
  # forks, where `pull_request` would be read-only. This is safe because no PR code is
  # checked out — the job only calls the upstream reusable workflow with a hardcoded
  # message.
  pull_request_target:
    types: [opened]

permissions:
  issues: write
  pull-requests: write

jobs:
  show-help:
    uses: shakacode/control-plane-flow/.github/workflows/cpflow-review-app-help.yml@1d82a6dc510745c3fe9b40b01ea348875a4f1923
    with:
      control_plane_flow_ref: 1d82a6dc510745c3fe9b40b01ea348875a4f1923
