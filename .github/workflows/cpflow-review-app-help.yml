name: Show Review App Commands on PR Open

on:
  # pull_request_target is intentional: it has write permission to comment on PRs from
  # forks, where `pull_request` would be read-only. This is safe because no PR code is
  # checked out — the job only calls the upstream reusable workflow with a hardcoded
  # message.
  pull_request_target:
    types: [opened]

permissions:
  issues: write
  pull-requests: write

jobs:
  show-help:
    # This is intentionally unconditional: adding this wrapper opts the repo in
    # to PR-open help. Remove the wrapper or add a repo-specific `if:` guard if
    # review apps should not be advertised before Control Plane is configured.
    uses: shakacode/control-plane-flow/.github/workflows/cpflow-review-app-help.yml@19ca93eadcba81e7438f26ab55a0f2ca7ace82b0
    with:
      control_plane_flow_ref: 19ca93eadcba81e7438f26ab55a0f2ca7ace82b0
