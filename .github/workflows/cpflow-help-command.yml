name: Review App Help Command

on:
  issue_comment:
    types: [created]
  workflow_dispatch:
    inputs:
      pr_number:
        description: Pull request number to post help on
        required: true
        type: number

permissions:
  issues: write
  pull-requests: write

jobs:
  help:
    if: |
      (github.event_name == 'issue_comment' &&
       github.event.issue.pull_request &&
       github.event.comment.body == '/help' &&
       contains(fromJson('["OWNER","MEMBER","COLLABORATOR"]'), github.event.comment.author_association)) ||
      github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest

    steps:
      - name: Post help message
        uses: actions/github-script@v7
        with:
          script: |
            const helpText = [
              "# Control Plane GitHub Flow",
              "",
              "## PR commands",
              "",
              "`/deploy-review-app`",
              "- Creates the review app if it does not exist",
              "- Builds the PR commit image",
              "- Deploys the image and comments with the review URL",
              "",
              "`/delete-review-app`",
              "- Deletes the review app when the PR is done",
              "- This also runs automatically when the PR closes",
              "",
              "## Repository secrets",
              "",
              "- `CPLN_TOKEN_STAGING`",
              "- `CPLN_TOKEN_PRODUCTION`",
              "- `DOCKER_BUILD_SSH_KEY` (optional, when Docker builds fetch private dependencies over SSH)",
              "",
              "## Repository variables",
              "",
              "- `CPLN_ORG_STAGING`",
              "- `CPLN_ORG_PRODUCTION`",
              "- `STAGING_APP_NAME`",
              "- `PRODUCTION_APP_NAME`",
              "- `REVIEW_APP_PREFIX`",
              "- `STAGING_APP_BRANCH` (optional, defaults to `main` or `master`)",
              "- `PRIMARY_WORKLOAD` (optional, defaults to `rails`)",
              "- `DOCKER_BUILD_EXTRA_ARGS` (optional Docker build flags)",
              "- `DOCKER_BUILD_SSH_KNOWN_HOSTS` (optional when SSH build hosts are not GitHub.com)",
              "",
              "## Workflow behavior",
              "",
              "- Review apps are opt-in and created with `/deploy-review-app`",
              "- New commits redeploy existing review apps automatically",
              "- Pushes to the staging branch deploy staging automatically",
              "- Promotion to production is manual via the Actions tab",
              "- A nightly workflow removes stale review apps"
            ].join("\n");

            const prNumber = context.eventName === "workflow_dispatch"
              ? Number(context.payload.inputs.pr_number)
              : context.issue.number;

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
              body: helpText
            });
